global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # 按需配置：邮件 / 企业微信 / 钉钉 / Slack
    # webhook_configs:
    #   - url: 'http://dingtalk-webhook:8060/dingtalk/ops/send'
    #     send_resolved: true

  - name: 'critical'
    # webhook_configs:
    #   - url: 'http://dingtalk-webhook:8060/dingtalk/critical/send'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
