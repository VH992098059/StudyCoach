apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-single
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
        - name: main
          image: studycoach-backend:latest
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          env:
            - name: GF_GCFG_FILE
              value: "/app/manifest/config/config.yaml"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: studycoach-secrets
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: studycoach-secrets
                  key: redis-password
          livenessProbe:
            httpGet:
              path: /gateway/healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /gateway/readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
